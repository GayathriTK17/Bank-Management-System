<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank Management System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Times New Roman", Times, serif; background: #f5f5f0; color: #222; font-size: 15px; }

    header { background: #1a1a2e; color: #fff; padding: 18px 32px; }
    header h1 { font-size: 20px; font-weight: normal; letter-spacing: 1px; }

    .layout { display: flex; min-height: calc(100vh - 60px); }

    nav { width: 200px; background: #fff; border-right: 1px solid #ddd; padding: 24px 0; flex-shrink: 0; }
    nav button { display: block; width: 100%; text-align: left; padding: 10px 20px; background: none; border: none; font-size: 14px; cursor: pointer; color: #444; border-left: 3px solid transparent; font-family: "Times New Roman", Times, serif; }
    nav button:hover  { background: #f0f0ea; }
    nav button.active { border-left-color: #1a1a2e; background: #f0f0ea; color: #1a1a2e; font-weight: bold; }
    nav .section-label { font-size: 11px; color: #999; padding: 16px 20px 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    main { flex: 1; padding: 32px; max-width: 700px; }
    .page { display: none; }
    .page.active { display: block; }

    h2 { font-size: 18px; font-weight: normal; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ddd; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
    input, select { width: 100%; padding: 9px 12px; border: 1px solid #ccc; background: #fff; font-size: 14px; font-family: "Times New Roman", Times, serif; outline: none; }
    input:focus, select:focus { border-color: #1a1a2e; }

    .btn { padding: 9px 22px; background: #1a1a2e; color: #fff; border: none; font-size: 14px; cursor: pointer; margin-top: 6px; font-family: "Times New Roman", Times, serif; }
    .btn:hover { background: #2d2d4e; }

    .result { margin-top: 18px; padding: 12px 16px; font-size: 14px; border-left: 3px solid #ccc; background: #fafaf7; display: none; }
    .result.ok  { border-left-color: #2a7a2a; color: #1a4d1a; background: #f0f9f0; }
    .result.err { border-left-color: #a00;    color: #700;    background: #fff5f5; }

    .balance-card { background: #fff; border: 1px solid #ddd; padding: 20px 24px; margin-bottom: 20px; display: none; }
    .balance-card .acc-name { font-size: 16px; margin-bottom: 4px; }
    .balance-card .acc-type { font-size: 12px; color: #888; margin-bottom: 14px; }
    .balance-card .amount   { font-size: 30px; letter-spacing: 1px; }
    .balance-card .label    { font-size: 12px; color: #888; margin-top: 4px; }

    .history-list { list-style: none; margin-top: 16px; }
    .history-list li { padding: 10px 0; border-bottom: 1px solid #eee; font-size: 13px; color: #444; }
    .history-list li:last-child { border-bottom: none; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 12px; background: #f0f0ea; font-weight: normal; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #555; border-bottom: 1px solid #ddd; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; color: #333; }
    tr:hover td { background: #fafaf7; }
  </style>
</head>
<body>

<header>
  <h1>Bank Management System</h1>
</header>

<div class="layout">
  <nav>
    <div class="section-label">Accounts</div>
    <button onclick="show('create')"   class="active" id="nav-create">Open Account</button>
    <button onclick="show('accounts')" id="nav-accounts">All Accounts</button>

    <div class="section-label">Transactions</div>
    <button onclick="show('deposit')"  id="nav-deposit">Deposit</button>
    <button onclick="show('withdraw')" id="nav-withdraw">Withdraw</button>
    <button onclick="show('transfer')" id="nav-transfer">Transfer</button>

    <div class="section-label">Info</div>
    <button onclick="show('balance')"  id="nav-balance">Check Balance</button>
    <button onclick="show('history')"  id="nav-history">Mini Statement</button>
    <button onclick="show('interest')" id="nav-interest">Apply Interest</button>
  </nav>

  <main>

    <!-- Open Account -->
    <div class="page active" id="page-create">
      <h2>Open New Account</h2>
      <div class="field"><label>Full Name</label><input id="c-name" placeholder="e.g. Arun Kumar" /></div>
      <div class="field"><label>Phone Number</label><input id="c-phone" placeholder="10-digit number" /></div>
      <div class="field"><label>4-digit PIN</label><input id="c-pin" type="password" maxlength="4" placeholder="****" /></div>
      <div class="field">
        <label>Account Type</label>
        <select id="c-type">
          <option value="savings">Savings (4% interest, min balance Rs.500)</option>
          <option value="current">Current (2% interest, overdraft Rs.1000)</option>
        </select>
      </div>
      <div class="field"><label>Initial Deposit (min Rs.500)</label><input id="c-deposit" type="number" placeholder="500" /></div>
      <button class="btn" onclick="createAccount()">Open Account</button>
      <div class="result" id="r-create"></div>
    </div>

    <!-- All Accounts -->
    <div class="page" id="page-accounts">
      <h2>All Accounts</h2>
      <button class="btn" onclick="loadAccounts()">Refresh</button>
      <br><br>
      <table>
        <thead><tr><th>Name</th><th>Account No.</th><th>Type</th><th>Balance (Rs.)</th></tr></thead>
        <tbody id="accounts-body"></tbody>
      </table>
    </div>

    <!-- Deposit -->
    <div class="page" id="page-deposit">
      <h2>Deposit Money</h2>
      <div class="field"><label>Account Number</label><input id="d-acc" placeholder="e.g. ACC1001" /></div>
      <div class="field"><label>Amount (Rs.)</label><input id="d-amt" type="number" placeholder="e.g. 1000" /></div>
      <button class="btn" onclick="deposit()">Deposit</button>
      <div class="result" id="r-deposit"></div>
    </div>

    <!-- Withdraw -->
    <div class="page" id="page-withdraw">
      <h2>Withdraw Money</h2>
      <div class="field"><label>Account Number</label><input id="w-acc" placeholder="e.g. ACC1001" /></div>
      <div class="field"><label>PIN</label><input id="w-pin" type="password" maxlength="4" placeholder="****" /></div>
      <div class="field"><label>Amount (Rs.)</label><input id="w-amt" type="number" placeholder="e.g. 500" /></div>
      <button class="btn" onclick="withdraw()">Withdraw</button>
      <div class="result" id="r-withdraw"></div>
    </div>

    <!-- Transfer -->
    <div class="page" id="page-transfer">
      <h2>Transfer Money</h2>
      <div class="field"><label>From Account</label><input id="t-from" placeholder="e.g. ACC1001" /></div>
      <div class="field"><label>PIN</label><input id="t-pin" type="password" maxlength="4" placeholder="****" /></div>
      <div class="field"><label>To Account</label><input id="t-to" placeholder="e.g. ACC1002" /></div>
      <div class="field"><label>Amount (Rs.)</label><input id="t-amt" type="number" placeholder="e.g. 200" /></div>
      <button class="btn" onclick="transfer()">Transfer</button>
      <div class="result" id="r-transfer"></div>
    </div>

    <!-- Balance -->
    <div class="page" id="page-balance">
      <h2>Check Balance</h2>
      <div class="field"><label>Account Number</label><input id="b-acc" placeholder="e.g. ACC1001" /></div>
      <div class="field"><label>PIN</label><input id="b-pin" type="password" maxlength="4" placeholder="****" /></div>
      <button class="btn" onclick="checkBalance()">Check Balance</button>
      <div class="balance-card" id="balance-card">
        <div class="acc-name" id="b-name"></div>
        <div class="acc-type" id="b-type"></div>
        <div class="amount"   id="b-balance"></div>
        <div class="label">Available Balance</div>
      </div>
      <div class="result" id="r-balance"></div>
    </div>

    <!-- Mini Statement -->
    <div class="page" id="page-history">
      <h2>Mini Statement</h2>
      <div class="field"><label>Account Number</label><input id="h-acc" placeholder="e.g. ACC1001" /></div>
      <div class="field"><label>PIN</label><input id="h-pin" type="password" maxlength="4" placeholder="****" /></div>
      <button class="btn" onclick="getHistory()">View Statement</button>
      <ul class="history-list" id="history-list"></ul>
      <div class="result" id="r-history"></div>
    </div>

    <!-- Apply Interest -->
    <div class="page" id="page-interest">
      <h2>Apply Interest</h2>
      <p style="font-size:13px;color:#666;margin-bottom:16px;">Credits annual interest. Savings: 4% | Current: 2%</p>
      <div class="field"><label>Account Number</label><input id="i-acc" placeholder="e.g. ACC1001" /></div>
      <div class="field"><label>PIN</label><input id="i-pin" type="password" maxlength="4" placeholder="****" /></div>
      <button class="btn" onclick="applyInterest()">Apply Interest</button>
      <div class="result" id="r-interest"></div>
    </div>

  </main>
</div>

<script>
  const API = "http://localhost:8080/api";

  function show(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById("page-" + page).classList.add("active");
    document.getElementById("nav-" + page).classList.add("active");
    if (page === "accounts") loadAccounts();
  }

  function showResult(id, msg, ok) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = "result " + (ok ? "ok" : "err");
    el.style.display = "block";
  }

  async function post(endpoint, data) {
    const body = Object.entries(data).map(([k, v]) => k + "=" + encodeURIComponent(v)).join("&");
    const res  = await fetch(API + endpoint, { method: "POST", body });
    return res.json();
  }

  async function createAccount() {
    const res = await post("/create", {
      name:    document.getElementById("c-name").value,
      phone:   document.getElementById("c-phone").value,
      pin:     document.getElementById("c-pin").value,
      type:    document.getElementById("c-type").value,
      deposit: document.getElementById("c-deposit").value
    });
    showResult("r-create", res.success ? res.message + " — Account No: " + res.accountNumber : res.message, res.success);
  }

  async function deposit() {
    const res = await post("/deposit", {
      accountNumber: document.getElementById("d-acc").value,
      amount:        document.getElementById("d-amt").value
    });
    showResult("r-deposit", res.success ? res.message + " | New Balance: Rs." + res.balance : res.message, res.success);
  }

  async function withdraw() {
    const res = await post("/withdraw", {
      accountNumber: document.getElementById("w-acc").value,
      pin:           document.getElementById("w-pin").value,
      amount:        document.getElementById("w-amt").value
    });
    showResult("r-withdraw", res.success ? res.message + " | New Balance: Rs." + res.balance : res.message, res.success);
  }

  async function transfer() {
    const res = await post("/transfer", {
      fromAccount: document.getElementById("t-from").value,
      toAccount:   document.getElementById("t-to").value,
      pin:         document.getElementById("t-pin").value,
      amount:      document.getElementById("t-amt").value
    });
    showResult("r-transfer", res.message, res.success);
  }

  async function checkBalance() {
    const card = document.getElementById("balance-card");
    card.style.display = "none";
    const res = await post("/balance", {
      accountNumber: document.getElementById("b-acc").value,
      pin:           document.getElementById("b-pin").value
    });
    if (res.success) {
      document.getElementById("b-name").textContent    = res.name;
      document.getElementById("b-type").textContent    = res.type + " Account";
      document.getElementById("b-balance").textContent = "Rs. " + res.balance.toFixed(2);
      card.style.display = "block";
      document.getElementById("r-balance").style.display = "none";
    } else {
      showResult("r-balance", res.message, false);
    }
  }

  async function getHistory() {
    const list = document.getElementById("history-list");
    list.innerHTML = "";
    const res = await post("/history", {
      accountNumber: document.getElementById("h-acc").value,
      pin:           document.getElementById("h-pin").value
    });
    if (res.success) {
      document.getElementById("r-history").style.display = "none";
      res.history.slice().reverse().forEach(entry => {
        const li = document.createElement("li");
        li.textContent = entry;
        list.appendChild(li);
      });
    } else {
      showResult("r-history", res.message, false);
    }
  }

  async function applyInterest() {
    const res = await post("/interest", {
      accountNumber: document.getElementById("i-acc").value,
      pin:           document.getElementById("i-pin").value
    });
    showResult("r-interest", res.success ? res.message + " | New Balance: Rs." + res.balance : res.message, res.success);
  }

  async function loadAccounts() {
    const res  = await fetch(API + "/accounts");
    const data = await res.json();
    const body = document.getElementById("accounts-body");
    body.innerHTML = "";
    data.accounts.forEach(a => {
      body.innerHTML += `<tr>
        <td>${a.name}</td>
        <td>${a.accountNumber}</td>
        <td>${a.type}</td>
        <td>${a.balance.toFixed(2)}</td>
      </tr>`;
    });
  }
</script>
</body>
</html>
